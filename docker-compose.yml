name: nreizen
services:
  web:
    container_name: php_web_nreizen
    build:
      context: .
      dockerfile_inline: |
        FROM php:8.4-apache
        RUN docker-php-ext-install pdo pdo_mysql
    restart: always
    ports:
      - "8800:80"
    volumes:
      - ./Nreizen:/var/www/html
    depends_on:
      - db

  db:
    image: mysql:lts
    container_name: mysql_db_nreizen
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: nreizen
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    volumes:
      - db_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin
    container_name: phpmyadmin_nreizen
    restart: always
    ports:
      - "8880:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: rootpassword
    depends_on:
      - db

volumes:
  db_data:
